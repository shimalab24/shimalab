<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Kota Uezu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Noto+Sans+JP:wght@300;400&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1C1A17;
  --bg-2:#23211D;
  --fg:#F2EDE4;
  --fg-dim:#A8A199;
  --line:rgba(242,237,228,.14);
  --accent:#B07A36;
}

*,*::before,*::after{box-sizing:border-box;min-width:0}
html{scroll-behavior:smooth;background:var(--bg)}
body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:"Noto Sans JP",sans-serif;
  font-weight:300;
  line-height:1.8;
  letter-spacing:.035em;
  word-break:keep-all;
  line-break:strict;
  overflow-wrap:break-word;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
h1,p{margin:0}
h1{overflow-wrap:normal;font-feature-settings:"palt" 1}
button{font:inherit}

.site-header{
  position:sticky;
  top:0;
  z-index:50;
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,max-content);
  align-items:center;
  gap:24px;
  min-height:68px;
  padding:0 clamp(18px,4vw,60px);
  border-bottom:1px solid var(--line);
  background:rgba(28,26,23,.78);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.brand{
  font-family:"Archivo",sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:.24em;
  text-transform:uppercase;
}
.business-link{
  color:var(--fg-dim);
  font-family:"Archivo","Noto Sans JP",sans-serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.1em;
  white-space:nowrap;
  transition:color .3s ease;
}
.business-link:hover{color:var(--fg)}

.title-block{
  width:min(1500px,94vw);
  margin:0 auto;
  padding:clamp(96px,14vw,190px) 0 clamp(76px,9vw,126px);
}
.title-block h1{
  font-family:"Shippori Mincho",serif;
  font-size:clamp(3.6rem,8vw,8.2rem);
  font-weight:500;
  line-height:1;
  letter-spacing:.015em;
}
.title-block p{
  margin-top:clamp(24px,3vw,38px);
  color:var(--fg-dim);
  font-family:"Archivo",sans-serif;
  font-size:clamp(.72rem,.68rem + .18vw,.86rem);
  letter-spacing:.13em;
}

.gallery{
  padding:0 0 clamp(110px,13vw,190px);
  background:var(--bg);
}
.jgal{
  width:min(1500px,94vw);
  margin:48px auto 0;
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  justify-content:center;
}
.jrow{
  flex:0 0 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}
.jrow--feature{
  margin-block:28px;
}
.jitem{
  position:relative;
  display:block;
  overflow:hidden;
  cursor:zoom-in;
  background:#0B0A09;
  opacity:0;
  transform:translateY(18px);
  transition:opacity .7s ease,transform .7s ease;
}
.jitem.is-visible{opacity:1;transform:none}
.jitem img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:transform .6s cubic-bezier(.2,.7,.2,1),filter .4s ease;
}
.jitem:hover img{transform:scale(1.03);filter:brightness(1.05)}

.glb{
  position:fixed;
  inset:0;
  z-index:130;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(18,16,14,.96);
  opacity:0;
  transition:opacity .35s ease;
}
.glb.open{display:flex;opacity:1}
.glb-stage{
  margin:0;
  max-width:92vw;
  max-height:88vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.glb-stage img{
  max-width:92vw;
  max-height:88vh;
  object-fit:contain;
  transform:scale(.96);
  opacity:0;
  transition:transform .44s cubic-bezier(.2,.7,.2,1),opacity .38s ease;
  box-shadow:0 30px 90px rgba(0,0,0,.55);
}
.glb.open .glb-stage img.in{transform:scale(1);opacity:1}
.glb-close,.glb-nav{
  position:absolute;
  z-index:2;
  min-height:44px;
  padding:0 15px;
  color:rgba(242,237,228,.82);
  background:rgba(28,26,23,.5);
  border:1px solid rgba(242,237,228,.18);
  cursor:pointer;
  font-family:"Archivo",sans-serif;
  font-size:10px;
  font-weight:500;
  letter-spacing:.16em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:background .3s ease,color .3s ease,border-color .3s ease;
}
.glb-close:hover,.glb-nav:hover{background:var(--accent);color:var(--bg);border-color:transparent}
.glb-close{top:20px;right:22px}
.glb-nav{top:50%;transform:translateY(-50%)}
.glb-prev{left:18px}
.glb-next{right:18px}
.glb-count{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(242,237,228,.7);
  font-family:"Archivo",sans-serif;
  font-size:13px;
  letter-spacing:.1em;
}

.site-footer{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:18px 32px;
  padding:34px clamp(18px,4vw,60px);
  border-top:1px solid var(--line);
  background:#0E0C09;
  color:rgba(242,237,228,.54);
  font-size:.78rem;
}
.footer-name{
  color:var(--fg);
  font-family:"Archivo",sans-serif;
  font-weight:500;
  letter-spacing:.14em;
}
.footer-link{border-bottom:1px solid currentColor}
.footer-link:hover{color:var(--fg)}

@media(max-width:900px){
  .title-block{padding-top:clamp(88px,15vw,130px)}
}
@media(max-width:560px){
  .site-header{min-height:62px;gap:12px;padding-inline:16px}
  .brand{font-size:10px;letter-spacing:.18em}
  .business-link{font-size:9px;letter-spacing:.06em}
  .title-block{width:calc(100vw - 32px);padding:82px 0 72px}
  .title-block h1{font-size:clamp(3.2rem,17vw,4.8rem)}
  .title-block p{font-size:.68rem;letter-spacing:.08em}
  .jgal{width:calc(100vw - 24px)}
  .glb-close{top:12px;right:12px}
  .glb-nav{top:auto;bottom:16px;transform:none}
  .glb-prev{left:12px}
  .glb-next{right:12px}
  .glb-count{bottom:29px}
  .site-footer{display:grid;grid-template-columns:minmax(0,1fr);padding-block:28px}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .jitem,.jitem img,.glb,.glb-stage img{transition:none}
  .jitem{opacity:1;transform:none}
}
</style>
</head>

<div id="glb" class="glb" aria-hidden="true" role="dialog" aria-modal="true" aria-label="写真ビューア">

  <div class="glb-count"><span id="glbCur">1</span> / <span id="glbTot">31</span></div>
</div>

<script>
(function(){
  var gal=document.getElementById('jgal'); if(!gal) return;
  var items=[].slice.call(gal.querySelectorAll('.jitem'));
  var GAP=18;
  function target(){var w=window.innerWidth;return w<=560?185:(w<=900?240:300);}
  function layout(){
    var cw=gal.clientWidth,t=target(),run=[];
    gal.innerHTML='';
    function makeRow(feature){
      var rowEl=document.createElement('div');
      rowEl.className='jrow'+(feature?' jrow--feature':'');
      gal.appendChild(rowEl);
      return rowEl;
    }
    function renderRow(row){
      var ar=row.reduce(function(s,it){return s+it.ar;},0);
      var h=(cw-GAP*(row.length-1))/ar;
      if(h>t*1.15)h=t;
      var rowEl=makeRow(false);
      row.forEach(function(it){
        it.el.style.width=(h*it.ar)+'px';
        it.el.style.height=h+'px';
        it.el.style.margin='';
        rowEl.appendChild(it.el);
      });
    }
    function groupScore(groups){
      var offset=0;
      return groups.reduce(function(score,size){
        var row=run.slice(offset,offset+size);
        var ar=row.reduce(function(s,it){return s+it.ar;},0);
        var h=(cw-GAP*(size-1))/ar;
        offset+=size;
        return score+Math.abs(h-t)/t;
      },0);
    }
    function chooseGroups(count){
      if(count<2)return [count];
      var choices=[];
      function build(left,groups){
        if(left===0){choices.push(groups);return;}
        if(left>=2)build(left-2,groups.concat(2));
        if(left>=3)build(left-3,groups.concat(3));
      }
      build(count,[]);
      if(!choices.length)return [count];
      choices.sort(function(a,b){return groupScore(a)-groupScore(b);});
      return choices[0];
    }
    function flushRun(){
      if(!run.length)return;
      var offset=0;
      chooseGroups(run.length).forEach(function(size){
        renderRow(run.slice(offset,offset+size));
        offset+=size;
      });
      run=[];
    }
    items.forEach(function(el){
      var ar=parseFloat(el.getAttribute('data-ar'))||1.5;
      if(el.hasAttribute('data-feature')){
        flushRun();
        var featureRow=makeRow(true);
        var width,height;
        if(ar>=1){
          width=Math.min(cw,cw*.78);
          height=width/ar;
        }else{
          height=Math.min(Math.round(cw*.52),720);
          width=height*ar;
        }
        el.style.width=width+'px';
        el.style.height=height+'px';
        el.style.margin='';
        featureRow.appendChild(el);
        return;
      }
      run.push({el:el,ar:ar});
    });
    flushRun();
  }
  window.addEventListener('resize',layout);
  window.addEventListener('load',layout);
  layout();setTimeout(layout,300);

  if('IntersectionObserver' in window){
    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(!entry.isIntersecting)return;
        var item=entry.target;
        item.style.transitionDelay=((Number(item.getAttribute('data-i'))%4)*70)+'ms';
        item.classList.add('is-visible');
        observer.unobserve(item);
      });
    },{rootMargin:'0px 0px -5% 0px',threshold:.08});
    items.forEach(function(item){observer.observe(item);});
  }else{
    items.forEach(function(item){item.classList.add('is-visible');});
  }
})();

(function(){
  var lb=document.getElementById('glb');
  var imgEl=document.getElementById('glbImg');
  var curEl=document.getElementById('glbCur');
  var items=[].slice.call(document.querySelectorAll('.jitem'));
  var tot=document.getElementById('glbTot'); if(tot) tot.textContent=items.length;
  var idx=0,closeTimer;
  if(!lb||!items.length)return;
  function render(i){
    idx=(i+items.length)%items.length;
    imgEl.classList.remove('in');
    window.setTimeout(function(){
      imgEl.src=items[idx].querySelector('img').getAttribute('src');
      curEl.textContent=idx+1;
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){imgEl.classList.add('in');});
      });
    },imgEl.src?150:0);
  }
  function open(i){
    window.clearTimeout(closeTimer);
    lb.style.display='flex';
    requestAnimationFrame(function(){
      lb.classList.add('open');
      render(i);
    });
    lb.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
    lb.querySelector('.glb-close').focus();
  }
  function close(){
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
    imgEl.classList.remove('in');
    closeTimer=window.setTimeout(function(){lb.style.display='none';},350);
  }
  items.forEach(function(item,i){
    item.addEventListener('click',function(e){e.preventDefault();open(i);});
  });
  lb.querySelector('.glb-close').addEventListener('click',close);
  lb.querySelector('.glb-prev').addEventListener('click',function(e){e.stopPropagation();render(idx-1);});
  lb.querySelector('.glb-next').addEventListener('click',function(e){e.stopPropagation();render(idx+1);});
  lb.addEventListener('click',function(e){
    if(e.target===lb||e.target.classList.contains('glb-stage'))close();
  });
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')close();
    else if(e.key==='ArrowLeft')render(idx-1);
    else if(e.key==='ArrowRight')render(idx+1);
  });
})();
</script>
